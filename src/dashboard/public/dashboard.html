<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>サーバー一覧 – AppleJapanBot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #1e1f22; color: #dbdee1; min-height: 100vh; }
    .navbar { background: #111214 !important; border-bottom: 1px solid #2b2d31; }
    .navbar-brand { color: #fff !important; font-weight: 700; }
    .user-info { color: #949ba4; font-size: 0.9rem; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; margin-right: 8px; }
    .page-header { padding: 40px 0 20px; }
    .page-header h2 { color: #fff; font-weight: 700; }
    .page-header p { color: #949ba4; }
    .guild-card {
      background: #2b2d31; border-radius: 12px; padding: 20px 24px;
      display: flex; align-items: center; gap: 16px;
      text-decoration: none; color: inherit;
      transition: background 0.15s, transform 0.1s;
      cursor: pointer;
    }
    .guild-card:hover { background: #36383d; transform: translateY(-1px); color: inherit; }
    .guild-icon { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; }
    .guild-icon-placeholder {
      width: 52px; height: 52px; border-radius: 50%;
      background: #5865f2; display: flex; align-items: center;
      justify-content: center; font-size: 1.3rem; color: #fff; font-weight: 700;
      flex-shrink: 0;
    }
    .guild-name { font-weight: 600; color: #fff; font-size: 1rem; }
    .guild-id { color: #949ba4; font-size: 0.8rem; }
    .guild-arrow { margin-left: auto; color: #949ba4; font-size: 1.2rem; }
    .empty-state { text-align: center; padding: 80px 0; color: #949ba4; }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .logout-btn { color: #949ba4; text-decoration: none; font-size: 0.9rem; }
    .logout-btn:hover { color: #f23f42; }
    #loading { text-align: center; padding: 60px 0; }
    .hidden { display: none; }
    .spinner-border { color: #5865f2; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="/dashboard.html">🤖 AppleJapanBot</a>
      <div class="ms-auto d-flex align-items-center gap-3">
        <div id="userInfo" class="user-info d-flex align-items-center"></div>
        <a href="/auth/logout" class="logout-btn">ログアウト</a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h2>サーバー一覧</h2>
      <p>Botが参加しており、あなたが管理権限を持つサーバーです。</p>
    </div>

    <div id="loading">
      <div class="spinner-border" role="status">
        <span class="visually-hidden">読み込み中...</span>
      </div>
      <p class="mt-3 text-secondary">サーバーを読み込んでいます...</p>
    </div>

    <div id="guildList" class="row g-3 hidden"></div>
    <div id="emptyState" class="empty-state hidden">
      <div class="icon">🏚️</div>
      <p>表示できるサーバーがありません。<br>Botを招待してから再度お試しください。</p>
    </div>
  </div>

  <script>
    async function loadUser() {
      const res = await fetch('/api/me');
      if (!res.ok) { window.location.href = '/'; return; }
      const user = await res.json();
      const div = document.getElementById('userInfo');
      div.innerHTML = `<img class="user-avatar" src="${escHtml(user.avatar)}" alt="avatar"><span>${escHtml(user.username)}</span>`;
    }

    async function loadGuilds() {
      const res = await fetch('/api/guilds');
      if (!res.ok) { window.location.href = '/'; return; }
      const guilds = await res.json();

      document.getElementById('loading').style.display = 'none';

      if (!guilds.length) {
        document.getElementById('emptyState').classList.remove('hidden');
        return;
      }

      const list = document.getElementById('guildList');
      list.classList.remove('hidden');
      list.innerHTML = guilds.map(g => `
        <div class="col-md-6 col-lg-4">
          <a class="guild-card" href="/guild.html?id=${encodeURIComponent(g.id)}">
            ${g.icon
              ? `<img class="guild-icon" src="${escHtml(g.icon)}" alt="icon">`
              : `<div class="guild-icon-placeholder">${escHtml(g.name[0] ?? '?')}</div>`}
            <div>
              <div class="guild-name">${escHtml(g.name)}</div>
              <div class="guild-id">${escHtml(g.id)}</div>
            </div>
            <span class="guild-arrow">›</span>
          </a>
        </div>
      `).join('');
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    loadUser();
    loadGuilds();
  </script>
</body>
</html>
